# Forgejo Actions — run the test suite on every push and pull request.
#
# Requires a self-hosted Forgejo runner registered with the `docker` label.

name: test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run prek hooks
        run: uvx prek run --all-files --show-diff-on-failure

  test:
    runs-on: docker
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run tests
        run: uv run --python ${{ matrix.python }} python -m unittest -v
